name: Build GitHub Pages Index

on:
  push:
    branches:
      - main
  schedule:
    # Run at 04:00 AM on the 1st of every month
    - cron: '0 4 1 * *'
  # Allow manual triggering
  workflow_dispatch:

# Grant GITHUB_TOKEN permissions to push to the repository
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run build script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python build_index.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: auto-update github pages root index" || echo "No changes to commit"
          git push
